 <!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MULTI.STORE — Преміум Електроніка</title>
    <style>
        :root {
            --bg-main: #f1f5f9;
            --surface: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --accent-gold: #d4af37;
            --accent-gold-hover: #b89321;
            --btn-gradient: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --btn-gradient-hover: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            --price-red: #df2020;
            --border-color: #e2e8f0;
            --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.04);
            --shadow-md: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            padding-bottom: 60px;
        }

        /* Преміальний Хедер */
        header {
            background: var(--surface);
            padding: 18px 20px;
            text-align: center;
            font-weight: 800;
            font-size: 22px;
            letter-spacing: 2px;
            color: var(--text-dark);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        /* Професійна Картка Товару */
        .product-card {
            background: var(--surface);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
            position: relative;
            transition: transform 0.3s ease;
        }

        /* Бейдж преміальності */
        .badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(15, 23, 42, 0.85);
            color: var(--accent-gold);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 20;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* Контейнер Слайдера */
        .slider-container {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background: #fafafa;
        }

        .slider-track {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .slide {
            min-width: 100%;
            height: 100%;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Елегантні Стрілки Слайдера */
        .slider-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid var(--border-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
            backdrop-filter: blur(4px);
         .slider-arrow:hover {
            background: var(--surface);
            transform: translateY(-50%) scale(1.05);
        }

        .arrow-left { left: 16px; }
        .arrow-right { right: 16px; }

        /* Сучасні Точки Слайдера */
        .slider-dots {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.2);
            padding: 5px 10px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .dot.active {
            background: var(--surface);
            width: 14px;
            border-radius: 3px;
        }

        /* Інформаційний Блок */
        .product-info {
            padding: 24px;
            border-top: 1px solid #f8fafc;
        }

        .product-title {
            font-size: 21px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
            line-height: 1.3;
        }

        /* Професійний Блок Цін */
        .price-block {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .current-price {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .old-price {
            font-size: 16px;
            text-decoration: line-through;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Преміальна Кнопка Замовлення */
        .buy-btn {
            display: block;
            width: 100%;
            background: var(--btn-gradient);
            color: var(--surface);
            text-align: center;
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
        }

        .buy-btn:hover {
            background: var(--btn-gradient-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(15, 23, 42, 0.2);
        }

        /* Елегантне Модальне Вікно */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 1000;
        }

        .modal {
            background: var(--surface);
            width: 100%;
            max-width: 500px;
            border-radius: 28px 28px 0 0;
            padding: 30px 24px;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-dark);
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            background: #f8fafc;
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-dark);
            outline: none;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--text-dark);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.05);
        }

        .submit-btn {
            width: 100%;
            background: var(--btn-gradient);
            color: var(--surface);
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s ease;
        }

        .submit-btn:hover {
            background: var(--btn-gradient-hover);
        }
    </style>
</head>
<body>

    <header>MULTI.STORE</header>

    <div class="container">

        <div class="product-card" id="p1">
            <div class="badge">PREMIUM</div>
            <div class="slider-container">
                <div class="slider-track">
                    <div class="slide"><img src="17824816315674350906478093768518.jpg" alt="Nia 1"></div>
                    <div class="slide"><img src="gkrvarevrnkvy (1).jpg" alt="Nia 2"></div>
                    <div class="slide"><img src="krvatravpavipk (1).jpg" alt="Nia 3"></div>
                </div>
                <button class="slider-arrow arrow-left" onclick="moveSlide('p1', -1)">&#10094;</button>
                <button class="slider-arrow arrow-right" onclick="moveSlide('p1', 1)">&#10095;</button>
                <div class="slider-dots">
                    <div class="dot active"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
            <div class="product-info">
                <div class="product-title">Бездротові навушники Nia NB710</div>
                <div class="price-block">
                    <span class="current-price">699 ₴</span>
                    <span class="old-price">1 200 ₴</span>
                </div>
                <button class="buy-btn" onclick="openOrderModal('Бездротові навушники Nia NB710')">Швидке замовлення</button>
            </div>
        </div>

        <div class="product-card" id="p2">
            <div class="badge">ТОП ПРОДАЖІВ</div>
            <div class="slider-container">
                <div class="slider-track">
                    <div class="slide"><img src="e4kcfivaiukcfvafvi.jpg" alt="Air 13 1"></div>
                    <div class="slide"><img src="kcfyafaukafvy.jpg" alt="Air 13 2"></div>
                    <div class="slide"><img src="kcvaipeukcafiv.jpg" alt="Air 13 3"></div>
                </div>
                <button class="slider-arrow arrow-left" onclick="moveSlide('p2', -1)">&#10094;</button>
                <button class="slider-arrow arrow-right" onclick="moveSlide('p2', 1)">&#10095;</button>
                <div class="slider-dots">
                    <div class="dot active"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
            <div class="product-info">
                <div class="product-title">Бездротові навушники Air 13 Pro</div>
                <div class="price-block">
                    <span class="current-price">750 ₴</span>
                    <span class="old-price">1 400 ₴</span>
                </div>
                <button class="buy-btn" onclick="openOrderModal('Бездротові навушники Air 13 Pro')">Швидке замовлення</button>
            </div>
        </div>
 <div class="product-card" id="p3">
            <div class="badge">NEW СТИЛЬ</div>
            <div class="slider-container">
                <div class="slider-track">
                    <div class="slide"><img src="8.jpg" alt="F9-5 1"></div>
                    <div class="slide"><img src="9.jpg" alt="F9-5 2"></div>
                </div>
                <button class="slider-arrow arrow-left" onclick="moveSlide('p3', -1)">&#10094;</button>
                <button class="slider-arrow arrow-right" onclick="moveSlide('p3', 1)">&#10095;</button>
                <div class="slider-dots">
                    <div class="dot active"></div>
                    <div class="dot"></div>
                </div>
            </div>
            <div class="product-info">
                <div class="product-title">Бездротові навушники F9-5 TWS + PowerBank</div>
                <div class="price-block">
                    <span class="current-price">550 ₴</span>
                    <span class="old-price">999 ₴</span>
                </div>
                <button class="buy-btn" onclick="openOrderModal('Бездротові навушники F9-5 TWS + PowerBank')">Швидке замовлення</button>
            </div>
        </div>

    </div>

    <div class="modal-overlay" id="orderModal" onclick="closeOrderModal(event)">
        <div class="modal">
            <div class="modal-title" id="modalProductTitle">Оформлення замовлення</div>
            <form id="tgForm" onsubmit="sendToTelegram(event)">
                <input type="hidden" id="productInput">
                <div class="form-group">
                    <label>Ваше ім'я та прізвище</label>
                    <input type="text" id="nameInput" class="form-control" placeholder="Іван Іванов" required>
                </div>
                <div class="form-group">
                    <label>Номер телефону</label>
                    <input type="tel" id="phoneInput" class="form-control" placeholder="+380" required>
                </div>
                <div class="form-group">
                    <label>Місто та номер відділення Нової Пошти</label>
                    <input type="text" id="deliveryInput" class="form-control" placeholder="Київ, Відділення №1" required>
                </div>
                <button type="submit" class="submit-btn">Підтвердити замовлення</button>
            </form>
        </div>
    </div>

    <script>
        const sliderStates = {
            p1: { current: 0, total: 3 },
            p2: { current: 0, total: 3 },
            p3: { current: 0, total: 2 }
        };

        function moveSlide(productId, direction) {
            const state = sliderStates[productId];
            state.current = (state.current + direction + state.total) % state.total;
            
            const card = document.getElementById(productId);
            const track = card.querySelector('.slider-track');
            track.style.transform = translateX(-${state.current * 100}%);
            
            const dots = card.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                if(index === state.current) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function openOrderModal(productName) {
            document.getElementById('productInput').value = productName;
            document.getElementById('modalProductTitle').innerText = productName;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeOrderModal(event) {
            if(event.target.id === 'orderModal') {
                document.getElementById('orderModal').style.display = 'none';
            }
        }

        function sendToTelegram(e) {
            e.preventDefault();
: const token = '7423984523:AAGXgX07W_GvPdS7pL4wNzRE2pMhYtrgXoo'; 
            const chatId = '6547839201'; 
            
            const product = document.getElementById('productInput').value;
            const name = document.getElementById('nameInput').value;
            const phone = document.getElementById('phoneInput').value;
            const delivery = document.getElementById('deliveryInput').value;
            
            const text = 🔔 **Нове замовлення!**\n\n📦 Товар: ${product}\n👤 Покупець: ${name}\n📞 Телефон: ${phone}\n📍 Доставка: ${delivery};
            
            const url = https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}&parse_mode=Markdown;
            
            fetch(url)
            .then(res => {
                if(res.ok) {
                    alert('Дякуємо! Ваше замовлення успішно прийнято. Менеджер зв\'яжеться з вами.');
                    document.getElementById('orderModal').style.display = 'none';
                    document.getElementById('tgForm').reset();
                } else {
                    alert('Помилка відправки. Спробуйте ще раз.');
                }
            })
            .catch(() => {
                alert('Помилка мережі.');
            });
        }
    </script>
</body>
</html>
